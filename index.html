<!DOCTYPE html>
<html>
<head>
<title>Nitkelmu Ftit Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#8882f2;
}

header{
background:#88888f;
color:white;
padding:10px;
text-align:center;
}

#container{
display:flex;
height:90vh;
}

#rooms{
width:200px;
background:#ddd;
padding:10px;
}

.room{
cursor:pointer;
padding:5px;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow:auto;
background:white;
padding:10px;
}

.msg{
border-bottom:1px solid #eee;
padding:6px;
}

.controls{
padding:10px;
background:#fafafa;
}

input{
padding:8px;
margin:4px;
}

button{
padding:8px;
margin:2px;
}

img{
max-width:150px;
display:block;
margin-top:5px;
}

video{
width:200px;
}

#loginBox{
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<header><b>Nitkelmu Ftit</b></header>

<div id="loginBox">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<br><br>

<button onclick="facebookLogin()">Login with Facebook</button>

</div>

<div id="container" style="display:none">

<div id="rooms">

<b>Rooms</b>

<div class="room" onclick="switchRoom('general')">General</div>
<div class="room" onclick="switchRoom('gaming')">Gaming</div>
<div class="room" onclick="switchRoom('music')">Music</div>

</div>

<div id="chatArea">

<div id="chat"></div>

<div class="controls">

<input id="message" placeholder="Message">
<input id="privateUser" placeholder="Private to (optional)">

<button onclick="send()">Send</button>

<button onclick="emoji('😀')">😀</button>
<button onclick="emoji('🔥')">🔥</button>
<button onclick="emoji('😂')">😂</button>

<button onclick="startCamera()">📷 Camera</button>

</div>

<video id="camera" autoplay></video>

<button onclick="capture()">Capture</button>

</div>

</div>

<script>

const SUPABASE_URL="https://ajcxjjbwoyugiwsslknw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8";

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null;
let room="general";
let capturedImage=null;
let lastMessageTime=0;

const chat=document.getElementById("chat");

function showChat(){

document.getElementById("loginBox").style.display="none";
document.getElementById("container").style.display="flex";

loadMessages();

}

async function signUp(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const {data,error}=await client.auth.signUp({
email:email,
password:password
});

if(error){alert(error.message);return;}

alert("Account created. Check email verification.");

}

async function signIn(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const {data,error}=await client.auth.signInWithPassword({
email:email,
password:password
});

if(error){alert(error.message);return;}

user=data.user;

showChat();

}

async function facebookLogin(){

await client.auth.signInWithOAuth({
provider:'facebook'
});

}

function emoji(e){

document.getElementById("message").value+=e;

}

function switchRoom(r){

room=r;

chat.innerHTML="";

loadMessages();

}

function addMessage(m){

if(m.room!==room) return;

let div=document.createElement("div");

div.className="msg";

div.innerHTML="<b>"+m.username+"</b>: "+(m.message||"");

if(m.image){

let img=document.createElement("img");
img.src=m.image;
div.appendChild(img);

}

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function loadMessages(){

const {data}=await client
.from("messages")
.select("*")
.eq("room",room)
.order("created_at",{ascending:false})
.limit(50);

chat.innerHTML="";

data.reverse().forEach(addMessage);

}

async function send(){

const text=document.getElementById("message").value;

const privateTo=document.getElementById("privateUser").value;

const now=Date.now();

if(now-lastMessageTime<2000){
alert("Slow down!");
return;
}

lastMessageTime=now;

if(text.length>200){
alert("Message too long");
return;
}

await client.from("messages").insert([{

username:user.email,
message:text,
room:room,
image:capturedImage,
private_to:privateTo||null

}]);

capturedImage=null;

document.getElementById("message").value="";

}

client
.channel("chat")
.on(
"postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
payload=>addMessage(payload.new)
)
.subscribe();

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true});

document.getElementById("camera").srcObject=stream;

}

function capture(){

const video=document.getElementById("camera");

const canvas=document.createElement("canvas");

canvas.width=200;
canvas.height=150;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0,200,150);

let data=canvas.toDataURL("image/jpeg",0.5);

if(data.length>100000){
alert("Image too large (max 100kb)");
return;
}

capturedImage=data;

alert("Image captured");

}

</script>

</body>
</html>
