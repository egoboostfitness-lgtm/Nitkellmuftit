<!DOCTYPE html>
<html>
<head>
  <title>Secure E2E Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    body{font-family:Arial;margin:0;background:#f2f2f2;display:flex;flex-direction:column;height:100vh;}
    header{background:#4a6cff;color:white;padding:10px;text-align:center;}
    #container{display:flex;flex:1;}
    #rooms{width:200px;background:#ddd;padding:10px;}
    .room{cursor:pointer;padding:5px;}
    #chatArea{flex:1;display:flex;flex-direction:column;}
    #chat{flex:1;overflow:auto;background:white;padding:10px;}
    #controls{padding:10px;background:#fafafa;}
    input{padding:8px;margin:4px;}
    button{padding:6px;margin:2px;}
    img{max-width:150px;display:block;margin-top:5px;}
    video{width:200px;}
    #loginBox{padding:20px;text-align:center;}
    #onlineSidebar{width:200px;background:#eee;padding:10px;overflow:auto;}
    .msg{border-bottom:1px solid #eee;padding:6px;}
    .admin{color:red;font-weight:bold;}
    #typing{font-size:12px;opacity:0.7;margin-top:2px;}
  </style>
</head>
<body>

<header>E2E Secure Chat</header>

<div id="loginBox">
  <h3>Login or Sign Up</h3>

  <div id="loginForm">
    <input id="loginUsername" placeholder="Username"><br>
    <input id="loginPassword" type="password" placeholder="Password"><br>
    <button id="loginBtn">Login</button>
  </div>

  <hr>

  <div id="signupForm">
    <input id="signupEmail" placeholder="Email"><br>
    <input id="signupUsername" placeholder="Username"><br>
    <input id="signupPassword" type="password" placeholder="Password"><br>
    <button id="signupBtn">Sign Up</button>
  </div>
</div>

<div id="container" style="display:none">
  <div id="rooms">
    <b>Rooms</b>
    <div class="room" onclick="switchRoom('general')">General</div>
    <div class="room" onclick="switchRoom('gaming')">Gaming</div>
    <div class="room" onclick="switchRoom('music')">Music</div>
  </div>

  <div id="chatArea">
    <div id="chat"></div>
    <div id="typing"></div>
    <div id="controls">
      <input id="message" placeholder="Message">
      <input id="privateUser" placeholder="Private to (optional)">
      <button onclick="sendMessage()">Send</button>
      <button onclick="addEmoji('😀')">😀</button>
      <button onclick="addEmoji('🔥')">🔥</button>
      <button onclick="addEmoji('😂')">😂</button>
      <button onclick="startCamera()">📷 Camera</button>
    </div>
    <video id="camera" autoplay></video>
    <button onclick="capture()">Capture</button>
  </div>

  <div id="onlineSidebar">
    <b>Online Users</b>
    <div id="onlineList"></div>
  </div>
</div>

<script>
const SUPABASE_URL="https://ajcxjjbwoyugiwsslknw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user=null, username="", room="general", capturedImage=null, lastMessageTime=0, isAdmin=false, secretKey=null;

document.addEventListener("DOMContentLoaded", function() {

  const chat = document.getElementById("chat");
  const onlineList = document.getElementById("onlineList");
  const typingIndicator = document.getElementById("typing");

  // ----------------- Event Listeners -----------------
  document.getElementById("signupBtn").addEventListener("click", signUp);
  document.getElementById("loginBtn").addEventListener("click", login);

  // ----------------- Auth -----------------
  async function signUp() {
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    username = document.getElementById("signupUsername").value.trim();
    if(!email || !username || !password){alert("All fields required"); return;}

    const {data, error} = await client.auth.signUp({email, password});
    if(error){alert(error.message); return;}

    await client.auth.updateUser({data:{username}});
    alert("Account created. Check your email verification before logging in.");
  }

  async function login() {
    username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    if(!username || !password){alert("All fields required"); return;}

    // Fetch user by username (you need a profiles table with username→email mapping)
    const {data, error} = await client.from("profiles").select("email").eq("username", username).single();
    if(error || !data){alert("Username not found"); return;}

    const {data:loginData, error:loginError} = await client.auth.signInWithPassword({
      email: data.email,
      password: password
    });
    if(loginError){alert(loginError.message); return;}
    user = loginData.user;

    secretKey = localStorage.getItem("chatSecretKey") || CryptoJS.lib.WordArray.random(16).toString();
    localStorage.setItem("chatSecretKey", secretKey);
    await checkAdmin();
    showChat();
  }

  async function checkAdmin(){
    const {data} = await client.from("admins").select("*").eq("email",user.email).single();
    if(data) isAdmin=true;
  }

  function showChat() {
    document.getElementById("loginBox").style.display="none";
    document.getElementById("container").style.display="flex";
    loadMessages();
    updateOnline();
  }

  // ----------------- Chat -----------------
  function addEmoji(e){document.getElementById("message").value+=e;}
  function switchRoom(r){room=r;chat.innerHTML="";loadMessages();}

  function encryptMessage(msg){return CryptoJS.AES.encrypt(msg, secretKey).toString();}
  function decryptMessage(cipher){try{return CryptoJS.AES.decrypt(cipher, secretKey).toString(CryptoJS.enc.Utf8);}catch{return "[Encrypted]";}}

  function addMessage(m){
    if(m.room!==room && m.private_to!==username && m.username!==user.email) return;
    let div = document.createElement("div");
    div.className="msg";
    let text = decryptMessage(m.message);
    let edited = m.edited?" (edited)":"";
    div.innerHTML="<b>"+(m.display_name||m.username)+"</b>: "+text+edited;

    if(m.image){
      let img=document.createElement("img");
      img.src = decryptMessage(m.image);
      div.appendChild(img);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function loadMessages(){
    const {data} = await client.from("messages")
      .select("*")
      .order("created_at",{ascending:true})
      .limit(50);
    chat.innerHTML="";
    if(data) data.forEach(addMessage);
  }

  async function sendMessage(){
    let text = document.getElementById("message").value;
    const privateTo = document.getElementById("privateUser").value;
    const now = Date.now();
    if(now-lastMessageTime<2000){alert("Slow down!"); return;}
    lastMessageTime=now;
    if(text.length>200){alert("Message too long"); return;}
    const spam = ["http","www",".com",".ru",".xyz"];
    for(let w of spam) if(text.includes(w)){alert("Links not allowed"); return;}
    let cipher = encryptMessage(text);
    let encryptedImage = capturedImage ? encryptMessage(capturedImage) : null;
    await client.from("messages").insert([{username:user.email,display_name:username,message:cipher,room:room,private_to:privateTo||null,image:encryptedImage}]);
    capturedImage=null;
    document.getElementById("message").value="";
    document.getElementById("privateUser").value="";
  }

  // ----------------- Camera -----------------
  async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById("camera").srcObject = stream;
  }

  function capture(){
    const video=document.getElementById("camera");
    const canvas=document.createElement("canvas");
    canvas.width=200; canvas.height=150;
    const ctx=canvas.getContext("2d");
    ctx.drawImage(video,0,0,200,150);
    let data=canvas.toDataURL("image/jpeg",0.5);
    if(data.length>100000){alert("Image too large (max 100kb)"); return;}
    capturedImage=data;
    alert("Image captured");
  }

  // ----------------- Online Users -----------------
  async function updateOnline(){
    if(!username) return;
    await client.from("online_users").upsert({username,last_seen:new Date().toISOString()});
    const {data} = await client.from("online_users").select("*");
    if(!data) return;
    const activeUsers = data.filter(u=>Date.now() - new Date(u.last_seen).getTime() < 120000);
    onlineList.innerHTML = activeUsers.map(u=>`<div>${u.username}</div>`).join("");
  }
  setInterval(updateOnline,5000);

  // ----------------- Typing Indicator -----------------
  document.getElementById("message").addEventListener("input", async () => {
    await client.from("typing").upsert({username, room, timestamp:new Date()});
  });

  client.channel("public:messages")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},payload=>{
      addMessage(payload.new);
    })
    .subscribe();

});
</script>
</body>
</html>
