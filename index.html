<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Chat X</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#e5ddd5;height:100vh;display:flex;flex-direction:column}
header{background:#075e54;color:white;padding:10px;text-align:center}

#container{flex:1;display:flex}

#rooms{width:150px;background:#ccc;padding:10px}
.room{cursor:pointer;margin:5px 0}

#chatArea{flex:1;display:flex;flex-direction:column}

#chat{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}

.msg{
max-width:60%;
padding:8px;
margin:5px;
border-radius:10px;
}

.me{background:#dcf8c6;align-self:flex-end}
.other{background:white;align-self:flex-start}

#controls{padding:10px;background:#f0f0f0}
#onlineSidebar{width:180px;background:#eee;padding:10px}

#typing{font-size:12px;color:#555}

.tick{font-size:10px;color:gray;margin-left:5px}
</style>
</head>

<body>

<header>Pro Chat X</header>

<div id="loginBox">
<input id="signupEmail" placeholder="Email"><br>
<input id="signupUsername" placeholder="Username"><br>
<input id="signupPassword" type="password" placeholder="Password"><br>
<button onclick="signUp()">Sign Up</button>

<hr>

<input id="loginUsername" placeholder="Username"><br>
<input id="loginPassword" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="container" style="display:none">

<div id="rooms">
<b>Rooms</b>
<div class="room" onclick="switchRoom('general')">General</div>
<div class="room" onclick="switchRoom('tech')">Tech</div>
<button onclick="leavePrivate()">Exit Private</button>
</div>

<div id="chatArea">
<div id="chat"></div>
<div id="typing"></div>

<div id="controls">
<input id="message" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<div id="onlineSidebar">
<b>Online</b>
<div id="onlineList"></div>
</div>

</div>

<script>

const client = supabase.createClient("https://ajcxjjbwoyugiwsslknw.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqY3hqamJ3b3l1Z2l3c3Nsa253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc4NTYsImV4cCI6MjA4OTAwMzg1Nn0.jHYCwncqJf941ae-MNi1fEPgMcUiPW9iUPXRcdLsXU8")

let username=""
let room="general"
let privateChatUser=null
let unreadCounts={}
let lastSend=0

// encryption
let key=localStorage.getItem("key")||CryptoJS.lib.WordArray.random(16).toString()
localStorage.setItem("key",key)

function enc(t){return CryptoJS.AES.encrypt(t,key).toString()}
function dec(t){try{return CryptoJS.AES.decrypt(t,key).toString(CryptoJS.enc.Utf8)}catch{return ""}}

// AUTH
async function signUp(){
let email=signupEmail.value
let u=signupUsername.value
let p=signupPassword.value

await client.auth.signUp({email,password:p})
await client.from("profiles").insert({email:email,username:u})
alert("Created")
}

async function login(){
let u=loginUsername.value
let p=loginPassword.value

let {data:prof}=await client.from("profiles").select("*").eq("username",u).single()
if(!prof){alert("No user");return}

await client.auth.signInWithPassword({email:prof.email,password:p})
username=u

loginBox.style.display="none"
container.style.display="flex"

loadMessages()
updateOnline()
}

// SWITCH
function switchRoom(r){
room=r
privateChatUser=null
chat.innerHTML=""
loadMessages()
}

// PRIVATE
function setPrivate(u){
privateChatUser=u
chat.innerHTML=""
loadMessages()
}

function leavePrivate(){
privateChatUser=null
chat.innerHTML=""
loadMessages()
}

// RENDER
function renderMessage(m){

if(privateChatUser){
if(!((m.username===username && m.private_to===privateChatUser)||(m.username===privateChatUser && m.private_to===username))) return
}else{
if(m.room!==room || m.private_to) return
}

let div=document.createElement("div")
div.className="msg "+(m.username===username?"me":"other")

let text=dec(m.message)

let ticks=""
if(m.username===username){
if(m.status==="sent") ticks="✓"
if(m.status==="delivered") ticks="✓✓"
if(m.status==="seen") ticks="✓✓"
}

div.innerHTML="<b>"+m.username+"</b><br>"+text+" <span class='tick'>"+ticks+"</span>"

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

// mark seen
if(m.username!==username){
client.from("messages").update({status:"seen"}).eq("id",m.id)
}

}

// LOAD
async function loadMessages(){

let query=client.from("messages").select("*").order("created_at",{ascending:true}).limit(50)

if(privateChatUser){
query=query.or(`and(username.eq.${username},private_to.eq.${privateChatUser}),and(username.eq.${privateChatUser},private_to.eq.${username})`)
}else{
query=query.eq("room",room).is("private_to",null)
}

let {data}=await query
chat.innerHTML=""
data.forEach(renderMessage)

}

// SEND
async function sendMessage(){

let text=message.value
if(!text) return

if(Date.now()-lastSend<1000)return
lastSend=Date.now()

await client.from("messages").insert({
username:username,
message:enc(text),
room:room,
private_to:privateChatUser,
status:"sent"
})

message.value=""
}

// ENTER
message.addEventListener("keydown",e=>{
if(e.key==="Enter"){e.preventDefault();sendMessage()}
})

// ONLINE
async function updateOnline(){

await client.from("online_users").upsert(
{username:username,last_seen:new Date().toISOString()},
{onConflict:["username"]}
)

let {data}=await client.from("online_users").select("*")

let active=data.filter(u=>new Date()-new Date(u.last_seen)<120000)

onlineList.innerHTML=active.map(u=>
`<div onclick="setPrivate('${u.username}')" style="cursor:pointer">${u.username}</div>`
).join("")
}

setInterval(updateOnline,5000)

// REALTIME
client.channel("msg")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},p=>{
renderMessage(p.new)

// update delivery
if(p.new.username!==username){
client.from("messages").update({status:"delivered"}).eq("id",p.new.id)
}
})
.subscribe()

</script>
</body>
</html>
